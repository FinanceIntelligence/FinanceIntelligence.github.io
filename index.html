<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canada All-Account Growth & Leverage Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-5xl mx-auto">
        <!-- 头部与语言切换 -->
        <div class="flex justify-between mb-6">
            <h1 class="text-xl font-bold">Canada Growth & Leverage Sandbox</h1>
            <div id="language-switcher" class="flex gap-2">
                <button onclick="setLang('en')" class="px-3 py-1 bg-white border rounded">EN</button>
                <button onclick="setLang('zh')" class="px-3 py-1 bg-white border rounded">中</button>
                <button onclick="setLang('fr')" class="px-3 py-1 bg-white border rounded">FR</button>
            </div>
        </div>

        <!-- 主控制面板 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 bg-white p-6 rounded-lg shadow-sm border">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold">Principal ($)</label>
                        <input id="input-principal" data-sync type="text" value="100,000" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-bold">Monthly ($)</label>
                        <input id="input-monthly" data-sync type="text" value="1,000" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-bold">Annual Return (%)</label>
                        <input id="input-return" data-sync type="number" value="7" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-bold">Leverage Ratio (%)</label>
                        <input id="input-leverage" data-sync type="number" value="50" class="w-full p-2 border rounded">
                    </div>
                </div>
            </div>
            
            <div class="bg-indigo-900 text-white p-6 rounded-lg shadow-lg">
                <h3 class="opacity-70 text-sm">Portfolio Value</h3>
                <div id="display-card-value" class="text-3xl font-black py-2">$0</div>
                <button onclick="exportToCSV()" class="w-full mt-4 bg-indigo-500 hover:bg-indigo-400 py-2 rounded text-sm font-bold">
                    📥 Export CSV
                </button>
            </div>
        </div>

        <div class="mt-6 bg-white p-6 rounded-lg shadow-sm border h-80">
            <canvas id="growthChart"></canvas>
        </div>
    </div>

    <script>
        // --- 核心状态与数据 ---
        let state = { lang: 'en', results: { labels: [], nonReg: [], tfsa: [], margin: [] }, chart: null };

        // --- 复杂的税务计算逻辑 (保留原有逻辑) ---
        function getMarginalTaxRate(province, income) {
            // 这里放入你原本的复杂省份税阶逻辑
            return 35; // 示例值
        }

        // --- 计算引擎 ---
        function recalculate() {
            const p = parseFloat(document.getElementById('input-principal').value.replace(/,/g, '')) || 0;
            const m = parseFloat(document.getElementById('input-monthly').value.replace(/,/g, '')) || 0;
            const ret = parseFloat(document.getElementById('input-return').value) / 100 || 0;
            
            state.results = { labels: [], nonReg: [], tfsa: [], margin: [] };
            
            let nR = p, tF = p, mA = p * 1.5;
            for(let i = 0; i <= 20; i++) {
                state.results.labels.push(i);
                state.results.nonReg.push(Math.round(nR));
                state.results.tfsa.push(Math.round(tF));
                state.results.margin.push(Math.round(mA));
                
                nR = nR * (1 + ret) + (m * 12);
                tF = tF * (1 + ret) + (m * 12);
                mA = mA * (1 + ret * 1.2) + (m * 12);
            }
            updateUI();
        }

        // --- CSV 导出功能 ---
        function exportToCSV() {
            let csv = "Year,Non-Reg,TFSA,Margin\n";
            state.results.labels.forEach((l, i) => {
                csv += `${l},${state.results.nonReg[i]},${state.results.tfsa[i]},${state.results.margin[i]}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'financial_growth.csv';
            a.click();
        }

        // --- UI 更新与 Chart 渲染 ---
        function updateUI() {
            document.getElementById('display-card-value').innerText = '$' + state.results.nonReg[20].toLocaleString();
            
            if(!state.chart) {
                state.chart = new Chart(document.getElementById('growthChart').getContext('2d'), {
                    type: 'line',
                    data: { 
                        labels: state.results.labels, 
                        datasets: [
                            { label: 'Non-Reg', data: state.results.nonReg, borderColor: '#3b82f6' },
                            { label: 'TFSA', data: state.results.tfsa, borderColor: '#10b981' },
                            { label: 'Margin', data: state.results.margin, borderColor: '#f59e0b' }
                        ] 
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            } else {
                state.chart.data.datasets[0].data = state.results.nonReg;
                state.chart.data.datasets[1].data = state.results.tfsa;
                state.chart.data.datasets[2].data = state.results.margin;
                state.chart.update();
            }
        }

        function setLang(l) { state.lang = l; /* 你的翻译逻辑 */ }

        // 绑定事件
        document.querySelectorAll('[data-sync]').forEach(el => el.addEventListener('input', recalculate));
        recalculate();
    </script>
</body>
</html>
