<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canada All-Account Growth & Leverage Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        input[type="range"] { accent-color: #2563eb; }
        input[type="text"]::-webkit-outer-spin-button, input[type="text"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen py-10 px-4">

<div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <!-- Header -->
    <div class="bg-gradient-to-r from-slate-800 to-indigo-950 text-white p-8 relative">
        <div class="absolute top-4 right-4 flex space-x-2 text-sm z-10">
            <button onclick="changeLanguage('en')" class="px-2.5 py-1 text-xs font-bold rounded border border-white bg-white text-slate-800">EN</button>
            <button onclick="changeLanguage('zh')" class="px-2.5 py-1 text-xs font-bold rounded border border-indigo-400 hover:bg-white hover:text-slate-800">中文</button>
            <button onclick="changeLanguage('fr')" class="px-2.5 py-1 text-xs font-bold rounded border border-indigo-400 hover:bg-white hover:text-slate-800">FR</button>
        </div>
        <div class="text-center mt-2">
            <h1 id="i18n-title" class="text-3xl font-extrabold mb-2 tracking-tight">Canada All-Account Growth & Leverage Sandbox</h1>
            <p id="i18n-subtitle" class="text-indigo-100 max-w-2xl mx-auto text-sm leading-relaxed">Compare Non-Registered, TFSA, and Margin accounts in real-time.</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="space-y-6">
            <h2 id="i18n-section-params" class="text-xl font-bold text-gray-700 border-b pb-2">Adjust Parameters</h2>
            
            <!-- Dynamic Inputs -->
            <div>
                <label class="text-sm font-semibold text-gray-600">Initial Principal</label>
                <input type="text" id="input-principal" class="w-full bg-gray-100 border rounded-lg px-2 py-1 font-bold" value="10,000">
                <input type="range" id="param-principal" min="1000" max="100000" step="1000" value="10000" class="w-full">
            </div>
            
            <div>
                <label class="text-sm font-semibold text-gray-600">Monthly Contribution</label>
                <input type="text" id="input-monthly" class="w-full bg-gray-100 border rounded-lg px-2 py-1 font-bold" value="500">
                <input type="range" id="param-monthly" min="0" max="10000" step="100" value="500" class="w-full">
            </div>
        </div>

        <div class="bg-slate-50 p-6 rounded-xl border border-gray-200">
            <h2 class="text-xl font-bold text-gray-700 mb-4 border-b pb-2">Analysis Hub</h2>
            <div id="display-card-bg" class="mb-6 p-5 bg-indigo-50 border rounded-xl">
                <span class="text-xs font-bold text-indigo-600 uppercase">Portfolio Net Value</span>
                <div class="text-3xl font-extrabold text-indigo-900" id="display-card-value">$0</div>
            </div>
        </div>
    </div>

    <!-- Referral Grid Container -->
    <div class="bg-gray-50 border-t px-8 py-8">
        <h5 id="i18n-grid-title" class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">My Financial Product Referrals</h5>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="referrals-container"></div>
    </div>
</div>

<script>
const translations = {
    en: { title: "Canada All-Account Growth & Leverage Sandbox", gridTitle: "My Curated Financial Referrals" },
    zh: { title: "🇨🇦 加拿大个人理财全账户增长与杠杆抵税沙盒", gridTitle: "加拿大精选高福利开户返现链接" },
    fr: { title: "🇨🇦 Bac à Sable de Croissance et Effet de Levier", gridTitle: "Mes liens de parrainage pour produits financiers" }
};

const refList = [
    { name: "Wealthsimple", link: "https://wealthsimple.com/invite/SR07QA", benefit: "$25 Bonus" },
    { name: "Rakuten", link: "#", benefit: "$30 Bonus" },
    { name: "EQ Bank", link: "#", benefit: "Up to $20" },
    { name: "Neo Financial", link: "#", benefit: "$25-$50 Bonus" },
    { name: "Tangerine", link: "#", benefit: "$50 Bonus" },
    { name: "Simplii Financial", link: "#", benefit: "$50 Bonus" },
    { name: "Chexy", link: "#", benefit: "Fee Waiver" }
];

function changeLanguage(lang) {
    document.getElementById('i18n-title').innerText = translations[lang].title;
    document.getElementById('i18n-grid-title').innerText = translations[lang].gridTitle;
    renderReferralGrid();
}

function renderReferralGrid() {
    const container = document.getElementById('referrals-container');
    container.innerHTML = refList.map(item => `
        <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
            <h3 class="font-bold text-sm">${item.name}</h3>
            <p class="text-xs text-green-600 font-semibold my-2">${item.benefit}</p>
            <a href="${item.link}" target="_blank" class="text-xs text-indigo-600 underline">Sign Up Now ↗</a>
        </div>
    `).join('');
}

function recalculate() {
    // 这里是你核心的计算逻辑入口
    console.log("Recalculating...");
}

// 初始化交互
document.querySelectorAll('input[type="range"]').forEach(slider => {
    slider.addEventListener('input', (e) => {
        const textInput = slider.previousElementSibling;
        if(textInput) textInput.value = e.target.value;
        recalculate();
    });
});

renderReferralGrid();
</script>
</body>
</html>
