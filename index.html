<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canada Growth & Leverage Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- 语言与标题 -->
        <div class="flex justify-between items-center mb-6">
            <h1 id="i18n-title" class="text-2xl font-black text-slate-800">Canada Investment Sandbox</h1>
            <div class="flex gap-2">
                <button onclick="changeLanguage('en')" id="lang-en" class="px-2 py-1 text-xs font-bold bg-white rounded border">EN</button>
                <button onclick="changeLanguage('zh')" id="lang-zh" class="px-2 py-1 text-xs font-bold bg-white rounded border">中</button>
                <button onclick="changeLanguage('fr')" id="lang-fr" class="px-2 py-1 text-xs font-bold bg-white rounded border">FR</button>
            </div>
        </div>

        <!-- 主控制区 -->
        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 id="i18n-section-params" class="font-bold mb-4 text-slate-700">Parameters</h2>
                <div class="space-y-4">
                    <div>
                        <label id="i18n-label-principal" class="block text-xs font-bold text-slate-500 mb-1">Principal</label>
                        <input id="input-principal" data-sync type="text" value="100,000" class="w-full p-2 border rounded text-sm">
                    </div>
                    <div>
                        <label id="i18n-label-monthly" class="block text-xs font-bold text-slate-500 mb-1">Monthly</label>
                        <input id="input-monthly" data-sync type="text" value="1,000" class="w-full p-2 border rounded text-sm">
                    </div>
                </div>
            </div>

            <!-- 结果与导出 -->
            <div class="bg-indigo-900 p-6 rounded-xl text-white shadow-lg">
                <div id="display-card-title" class="text-sm font-bold opacity-70">Result</div>
                <div id="display-card-value" class="text-4xl font-black my-2">$0</div>
                <button onclick="exportToCSV()" class="mt-4 w-full py-2 bg-indigo-600 rounded-lg text-xs font-bold hover:bg-indigo-500 transition-all">
                    💾 Export CSV Data
                </button>
            </div>
        </div>

        <!-- 图表区 -->
        <div class="mt-6 bg-white p-6 rounded-xl shadow-sm border h-80">
            <canvas id="growthChart"></canvas>
        </div>
    </div>

    <script>
        const translations = {
            en: { title: "Canada Investment Sandbox", sectionParams: "Parameters", labelPrincipal: "Initial Principal", labelMonthly: "Monthly Contribution", btnExport: "Export CSV" },
            zh: { title: "加拿大投资沙盒", sectionParams: "参数设置", labelPrincipal: "初始本金", labelMonthly: "每月投入", btnExport: "导出 CSV" },
            fr: { title: "Bac à Sable Financier", sectionParams: "Paramètres", labelPrincipal: "Principal Initial", labelMonthly: "Contribution Mensuelle", btnExport: "Exporter CSV" }
        };

        let state = { lang: 'en', results: { labels: [], nonReg: [], tfsa: [], margin: [] }, chart: null };

        function calculateEngine() {
            const p = parseFloat(document.getElementById('input-principal').value.replace(/,/g, '')) || 0;
            const m = parseFloat(document.getElementById('input-monthly').value.replace(/,/g, '')) || 0;
            
            state.results = { labels: [], nonReg: [], tfsa: [], margin: [] };
            let val = p;
            for (let i = 0; i <= 20; i++) {
                state.results.labels.push(i);
                state.results.nonReg.push(Math.round(val));
                state.results.tfsa.push(Math.round(val * 1.1)); // 示例逻辑
                state.results.margin.push(Math.round(val * 1.2));
                val = val * 1.07 + (m * 12);
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('display-card-value').innerText = '$' + state.results.nonReg[20].toLocaleString();
            if (!state.chart) {
                state.chart = new Chart(document.getElementById('growthChart'), {
                    type: 'line',
                    data: { labels: state.results.labels, datasets: [{ label: 'Non-Reg', data: state.results.nonReg, borderColor: '#3b82f6' }] },
                    options: { maintainAspectRatio: false }
                });
            } else {
                state.chart.data.datasets[0].data = state.results.nonReg;
                state.chart.update();
            }
        }

        function exportToCSV() {
            const { labels, nonReg, tfsa, margin } = state.results;
            let csv = "Year,Non-Reg,TFSA,Margin\n" + labels.map((l, i) => `${l},${nonReg[i]},${tfsa[i]},${margin[i]}`).join('\n');
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = 'data.csv';
            a.click();
        }

        function changeLanguage(lang) {
            state.lang = lang;
            document.getElementById('i18n-title').innerText = translations[lang].title;
            document.getElementById('i18n-section-params').innerText = translations[lang].sectionParams;
        }

        document.querySelectorAll('[data-sync]').forEach(el => el.addEventListener('input', calculateEngine));
        calculateEngine();
    </script>
</body>
</html>
